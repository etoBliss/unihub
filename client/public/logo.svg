<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
    <defs>
        <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f3d077" />
            <stop offset="100%" stop-color="#c9a84c" />
        </linearGradient>
        <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#16213e" />
            <stop offset="100%" stop-color="#0f3460" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Deep Navy Background Circle -->
    <circle cx="50" cy="50" r="48" fill="url(#blue-grad)" stroke="url(#gold-grad)" stroke-width="2.5" />
    
    <!-- Stylized Connecting Hub Nodes (Collaboration theme) -->
    <path d="M50 18 L72 38 L65 72 L35 72 L28 38 Z" stroke="rgba(201, 168, 76, 0.25)" stroke-width="1" stroke-dasharray="3 3" />
    <circle cx="50" cy="18" r="3" fill="#f3d077" />
    <circle cx="72" cy="38" r="3" fill="#f3d077" />
    <circle cx="65" cy="72" r="3" fill="#f3d077" />
    <circle cx="35" cy="72" r="3" fill="#f3d077" />
    <circle cx="28" cy="38" r="3" fill="#f3d077" />
    
    <!-- Central Monogram 'U' overlaid with Graduation Cap profile -->
    <!-- Stylized modern "U" -->
    <path d="M38 35 V52 C38 60 43 65 50 65 C57 65 62 60 62 52 V35" stroke="url(#gold-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Graduation Cap / Diamond floating on top -->
    <path d="M50 25 L65 32 L50 39 L35 32 Z" fill="url(#gold-grad)" filter="url(#glow)" />
    <!-- Tassel -->
    <path d="M65 32 V43 C65 45 61 47 61 47" stroke="#f3d077" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Shield/Crest wings -->
    <path d="M22 45 C22 65 50 78 50 78 C50 78 78 65 78 45" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
</svg>
